name: Update ArknightsStoryJson submodule

on:
  schedule:
    # Run daily at 09:00 JST (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update submodule to latest main
        run: |
          cd data/ArknightsStoryJson
          git fetch origin main
          git checkout origin/main

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet data/ArknightsStoryJson; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No submodule changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Submodule has new commits"
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ArknightsStoryJson
          git commit -m "Update ArknightsStoryJson to latest"
          git push
